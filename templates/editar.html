{% extends "base.html" %}

{% block content %}

<h3>Editar Producto</h3>

<form method="POST">

    <input type="text" name="name" value="{{ producto.name }}" class="form-control mb-2">

    <input type="number" step="0.01" name="price" value="{{ producto.price }}" class="form-control mb-2">

    <input type="number" name="stock" value="{{ producto.stock }}" class="form-control mb-2">

    <button class="btn btn-warning">Actualizar</button>

</form>

{% endblock %}
